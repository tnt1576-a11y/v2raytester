name: Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
    tags:
      - "android-v*"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch:

# pin the Xray core version that gets bundled as libxray.so
env:
  XRAY_VERSION: v26.3.27

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Unit tests (JVM, no device)
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Bundle Xray core (arm64) as libxray.so
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L -o xray.zip "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-android-arm64-v8a.zip"
          unzip -o xray.zip xray -d xray-tmp
          cp xray-tmp/xray app/src/main/jniLibs/arm64-v8a/libxray.so
          ls -lh app/src/main/jniLibs/arm64-v8a/

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk ../v2raytester.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2raytester-apk
          path: v2raytester.apk

      - name: Attach APK to release (on tag)
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: v2raytester.apk
